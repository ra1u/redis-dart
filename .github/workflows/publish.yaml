name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  Publish:
    permissions:
      id-token: write
    runs-on: ubuntu-latest

    env:
      REDIS_URL: localhost
      REDIS_PORT: 6379

    services:
      redis:
        image: redis
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1

      - run: dart pub get
      - run: dart analyze
      - run: dart test
      - run: dart pub publish --force
